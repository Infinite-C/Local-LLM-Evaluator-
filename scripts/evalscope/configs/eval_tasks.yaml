tasks:
  # ==================== 基座模型基础能力 ====================
  # 1. 知识能力（Knowledge / MCQ）9b:0.87 4b:0.55总数285
  - name: mmlu
    display_name: 英文通用知识能力
    dimension: general_knowledge
    dataset: mmlu
    metric: acc
    limit: 5
    enabled: true
    need_judge_model: false
    task_type: multiple_choice

  # 2. 中文能力（Chinese / QA / MCQ）9b:0.83 4b:0.32总数260
  - name: ceval
    display_name: 中文知识能力
    dimension: chinese_knowledge
    dataset: ceval
    metric: acc
    limit: 5
    enabled: true
    need_judge_model: false
    task_type: multiple_choice

  # 3. 多语言能力（MultiLingual）9b:0.7218总数1100 4b:0.75总数550
  - name: mgsm
    display_name: 多语言数学推理
    dimension: multilingual_math
    dataset: mgsm
    metric: acc
    limit: 50
    enabled: true
    need_judge_model: false
    task_type: math
  
  # 4. 数学能力（Math / Reasoning）9b:0.69 4b:0.80总数50
  - name: gsm8k
    display_name: 数学推理能力
    dimension: math_reasoning
    dataset: gsm8k
    metric: acc
    limit: 50
    enabled: true
    need_judge_model: false
    task_type: math

  # 5. 推理能力（Reasoning）9b:0.80总数270 4b:0.63总数270
  - name: bbh
    display_name: BIG-Bench Hard
    dimension: reasoning
    dataset: bbh
    eval_backend: opencompass
    metric: acc
    limit: 10
    enabled: true
    task_type: generation

  # 6. 常识理解能力（Commonsense / Reasoning）9b:0.42总数50 4b:0.36总数50
  - name: hellaswag
    display_name: 常识推理 (HellaSwag)
    dimension: commonsense_reasoning
    dataset: hellaswag
    eval_backend: opencompass
    metric: acc
    limit: 50
    enabled: true
    need_judge_model: false
    task_type: multiple_choice

  # 7. 代码能力（Coding）9b:1.00总数20 4b:0.90总数20
  
  - name: humaneval
    display_name: 代码能力
    dimension: coding
    dataset: humaneval
    metric: pass_at_1
    limit: 20
    enabled: true
    need_judge_model: false
    task_type: code

